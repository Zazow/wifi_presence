name: Build and publish image

# Build the Docker image and push it to GitHub Container Registry (GHCR) on
# every push to the default branch. Free for public repos/packages.

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercased automatically; resolves to ghcr.io/<owner>/<repo>.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64        # your i7 server; add linux/arm64 here for a Pi
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
